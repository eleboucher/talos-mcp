---
apiVersion: talos.dev/v1alpha1
kind: ServiceAccount
metadata:
  name: talos-mcp-talosconfig
  namespace: toolhive-system
spec:
  roles:
    - os:reader
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: talos-mcp
  namespace: toolhive-system
spec:
  image: registry.erwanleboucher.dev/eleboucher/talos-mcp:0.1.0
  transport: streamable-http
  mcpPort: 8080
  proxyPort: 8080
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          env:
            - name: TALOS_MCP_TRANSPORT
              value: http
            - name: TALOS_MCP_HTTP_ADDR
              value: ":8080"
          volumeMounts:
            - name: talosconfig
              mountPath: /var/run/secrets/talos.dev
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: talosconfig
          secret:
            secretName: talos-mcp-talosconfig
            defaultMode: 0400
